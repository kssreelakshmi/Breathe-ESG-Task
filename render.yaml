databases:
  - name: breatheesg-db
    databaseName: breatheesg
    user: breatheesg
    plan: free

services:
  - type: web
    name: breatheesg-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: breatheesg-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false         # fill in manually after frontend deploys

  - type: web
    name: breatheesg-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false         # fill in manually after backend deploys
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
